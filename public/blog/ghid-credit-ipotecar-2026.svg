<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Ghid credit ipotecar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1B3E"/>
      <stop offset="1" stop-color="#00D186"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F5F7FA" stop-opacity="0.98"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- soft blobs -->
  <circle cx="1250" cy="180" r="220" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="1400" cy="520" r="300" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="260" cy="640" r="260" fill="#FFFFFF" opacity="0.10"/>

  <!-- main card -->
  <rect x="160" y="180" width="1280" height="540" rx="28" fill="url(#card)"/>
  <rect x="160" y="180" width="1280" height="540" rx="28" fill="none" stroke="#E5E7EB"/>

  <!-- lend mark -->
  <g transform="translate(220 240)">
    <rect x="0" y="0" width="10" height="40" rx="3" fill="#00D186"/>
    <rect x="16" y="0" width="10" height="40" rx="3" fill="#00D186" opacity="0.70"/>
    <rect x="32" y="0" width="10" height="40" rx="3" fill="#00D186" opacity="0.40"/>
    <text x="58" y="30" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0B1B3E">lend.ro</text>
  </g>

  <!-- title -->
  <text x="220" y="360" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="#0B1B3E">Ghid credit ipotecar</text>
  <text x="220" y="420" font-family="Arial, sans-serif" font-size="30" font-weight="600" fill="#374151">Pași, documente, comparații și instrumente</text>

  <!-- bullets -->
  <g font-family="Arial, sans-serif" font-size="26" fill="#111827">
    <text x="260" y="510">• Tipuri de credite și eligibilitate</text>
    <text x="260" y="560">• Costuri (DAE, comisioane) explicate simplu</text>
    <text x="260" y="610">• Calculator & comparație bănci</text>
  </g>

  <!-- CTA pill -->
  <g transform="translate(220 650)">
    <rect x="0" y="0" width="420" height="64" rx="18" fill="#00D186"/>
    <text x="28" y="42" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">Calculează rata →</text>
  </g>

  <!-- small disclaimer -->
  <text x="220" y="740" font-family="Arial, sans-serif" font-size="18" fill="#6B7280">Imagine ilustrativă. Informații orientative.</text>
</svg>
